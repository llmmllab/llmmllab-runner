# ---------------------------------------------------------------------------
# briaai/RMBG-2.0 (in-process pipeline — background removal)
#
# Lives on the small runner because the model is tiny (220M params,
# 885 MB safetensors, ~1 s per request on a single 3060), and keeping
# it here frees the big runner's GPUs for the larger image / 3D
# pipelines (Qwen-Image, Hunyuan3D).
#
# Reachable at:
#   POST /v1/pipelines/rembg/run         (runner-direct)
#   POST /v1/images/remove-bg            (api wrapper, recommended)
#   GET  /v1/images/remove-bg/<id>.png   (download cutout PNG)
#
# /v1/server/create rejects ``provider: in_process`` with a pointer to
# /v1/pipelines/*.  The RMBG pipeline reads ``details.model_path`` from
# this entry on first request and loads the safetensors + custom
# BiRefNet code (birefnet.py) from there.  The repo is gated on HF; the
# weights are pre-downloaded into the /models hostPath on lsnode-4
# out-of-band so the pod doesn't need an HF token at runtime.
#
# Tutorial: https://huggingface.co/briaai/RMBG-2.0
# ---------------------------------------------------------------------------
- id: rmbg-2.0
