apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmmllab-runner
  namespace: llmmllab
  labels:
    app: llmmllab-runner
spec:
  selector:
    matchLabels:
      app: llmmllab-runner
  template:
    metadata:
      labels:
        app: llmmllab-runner
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: lsnode-3
      volumes:
        - name: models
          hostPath:
            path: /models
            type: DirectoryOrCreate
        - name: slots
          hostPath:
            path: /slots
            type: DirectoryOrCreate
      containers:
        - name: llmmllab-runner
          image: 192.168.0.71:31500/llmmllab-runner:latest
          imagePullPolicy: Always
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RAWIO
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              memory: "8Gi"
              cpu: "4"
            limits:
              # 20Gi was still OOMKilled (12 restarts in 16h observed
              # 2026-05-21).  The model file's mmap page cache grows
              # under cgroup v2 accounting and eventually trips the cap.
              # Bumped to 24 GiB — still leaves ~8 GiB headroom on the
              # 32 GB host for kubelet + other workloads.  If OOM
              # recurs, the next thing to investigate is a real leak
              # in our code rather than just bumping the cap further.
              memory: "24Gi"
              cpu: "8"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: slots
              mountPath: /slots
          env:
            - name: PYTHONPATH
              value: "/app"
            - name: PYTHONUNBUFFERED
              value: "1"
            # Used by utils/dcgm_metrics.py to filter DCGM exporter scrapes
            # to the local node's GPUs only.  The dcgm-exporter Service
            # load-balances across all GPU nodes; without this filter,
            # alternating scrapes would return foreign-node metrics.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: LLAMA_SERVER_EXECUTABLE
              value: "/llama.cpp/build/bin/llama-server"
            - name: MODELS_FILE_PATH
              value: "/app/.models.yaml"
            - name: CACHE_TIMEOUT_MIN
              value: "6"
            - name: EVICTION_TIMEOUT_MIN
              value: "12"
            - name: RUNNER_PORT
              value: "8000"
            - name: RUNNER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT_RANGE_START
              value: "8001"
            - name: SERVER_PORT_RANGE_END
              value: "8900"
            - name: CUDA_VISIBLE_DEVICES
              value: "0,1,2"
            - name: CUDA_DEVICE_ORDER
              value: "PCI_BUS_ID"
            - name: CUDA_LAUNCH_BLOCKING
              value: "0"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility,video"
            - name: PYTHONMALLOC
              value: "malloc"
            - name: MALLOC_ARENA_MAX
              value: "2"
            - name: GGML_LOG_LEVEL
              value: "2"
            - name: LOG_FORMAT
              value: "json"
            - name: RUNNER_NAME
              value: "llmmllab-runner"
            - name: TEMPO_ENDPOINT
              value: "http://tempo.llmmllab.svc.cluster.local:4317"
            - name: DCGM_METRICS_ENABLED
              value: "true"
            # Use the cluster Service for the gpu-operator DaemonSet
            # exporter; utils/dcgm_metrics.py filters by NODE_NAME to
            # the local node so cross-node samples are dropped even
            # when the Service load-balances.
            - name: DCGM_EXPORTER_URL
              value: "http://nvidia-dcgm-exporter.gpu-operator.svc.cluster.local:9400/metrics"
            - name: SLOT_SAVE_DIR
              value: "/slots"
        # No DCGM exporter sidecar — Prometheus scrapes the
        # gpu-operator's nvidia-dcgm-exporter DaemonSet directly (see
        # k8s/prometheus-config.yaml) and Grafana panels query
        # DCGM_FI_DEV_* metrics natively.  The runner's local DCGM
        # scrape loop is still functional via the cluster Service for
        # internal gauges, filtered by NODE_NAME to the local node.
  strategy:
    type: Recreate
---
