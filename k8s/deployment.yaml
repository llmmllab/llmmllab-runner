apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmmllab-runner
  namespace: llmmllab
  labels:
    app: llmmllab-runner
spec:
  selector:
    matchLabels:
      app: llmmllab-runner
  template:
    metadata:
      labels:
        app: llmmllab-runner
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: lsnode-3
      volumes:
        - name: models
          hostPath:
            path: /models
            type: DirectoryOrCreate
        - name: slots
          hostPath:
            path: /slots
            type: DirectoryOrCreate
        - name: dcgm-uvm
          emptyDir: {}
      containers:
        - name: llmmllab-runner
          image: 192.168.0.71:31500/llmmllab-runner:latest
          imagePullPolicy: Always
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RAWIO
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              memory: "8Gi"
              cpu: "4"
            limits:
              memory: "16Gi"
              cpu: "8"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: slots
              mountPath: /slots
          env:
            - name: PYTHONPATH
              value: "/app"
            - name: PYTHONUNBUFFERED
              value: "1"
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: LLAMA_SERVER_EXECUTABLE
              value: "/llama.cpp/build/bin/llama-server"
            - name: MODELS_FILE_PATH
              value: "/app/.models.yaml"
            - name: CACHE_TIMEOUT_MIN
              value: "10"
            - name: EVICTION_TIMEOUT_MIN
              value: "30"
            - name: RUNNER_PORT
              value: "8000"
            - name: RUNNER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT_RANGE_START
              value: "8001"
            - name: SERVER_PORT_RANGE_END
              value: "8900"
            - name: CUDA_VISIBLE_DEVICES
              value: "0,1,2"
            - name: CUDA_DEVICE_ORDER
              value: "PCI_BUS_ID"
            - name: CUDA_LAUNCH_BLOCKING
              value: "0"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility,video"
            - name: PYTHONMALLOC
              value: "malloc"
            - name: MALLOC_ARENA_MAX
              value: "2"
            - name: GGML_LOG_LEVEL
              value: "2"
            - name: LOG_FORMAT
              value: "json"
            - name: RUNNER_NAME
              value: "llmmllab-runner"
            - name: TEMPO_ENDPOINT
              value: "http://tempo.llmmllab.svc.cluster.local:4317"
            - name: DCGM_METRICS_ENABLED
              value: "true"
            # - name: SLOT_SAVE_DIR
            # value: "/slots"
        # DCGM exporter disabled - entrypoint script missing in image
        # - name: dcgm-exporter
        #   image: nvcr.io/nvidia/k8s/dcgm-exporter:2.3.2-2.6.2-ubuntu20.04
        #   ports:
        #     - containerPort: 9400
        #       protocol: TCP
        #   securityContext:
        #     privileged: true
        #   volumeMounts:
        #     - name: dcgm-uvm
        #       mountPath: /usr/local/dcgm
        #   resources:
        #     requests:
        #       memory: "500Mi"
        #       cpu: "100m"
        #     limits:
        #       memory: "1Gi"
        #       cpu: "200m"
  strategy:
    type: Recreate
---
