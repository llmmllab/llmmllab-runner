apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmmllab-runner
  namespace: llmmllab
  labels:
    app: llmmllab-runner
spec:
  selector:
    matchLabels:
      app: llmmllab-runner
  template:
    metadata:
      labels:
        app: llmmllab-runner
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: lsnode-3
      volumes:
        - name: models
          hostPath:
            path: /models
            type: DirectoryOrCreate
        - name: slots
          hostPath:
            path: /slots
            type: DirectoryOrCreate
        # Required by the dcgm-exporter sidecar — exposes per-pod GPU
        # device-resource info from kubelet so DCGM can attribute
        # metrics to GPU UUIDs allocated to containers on this node.
        # Read-only hostPath, same mount path the gpu-operator's own
        # DaemonSet uses.
        - name: pod-gpu-resources
          hostPath:
            path: /var/lib/kubelet/pod-resources
            type: Directory
      containers:
        - name: llmmllab-runner
          image: 192.168.0.71:31500/llmmllab-runner:latest
          imagePullPolicy: Always
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RAWIO
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              memory: "8Gi"
              cpu: "4"
            limits:
              # With --no-mmap disabled (SLOT_NO_MMAP=false), model
              # weights are memory-mapped from disk by the OS page
              # cache.  In theory only actively-touched pages stay
              # resident.  In practice on cgroup v2 (which counts
              # file-backed page cache against the limit) sustained
              # inference can hold tens of GiB of model pages until
              # the kernel evicts under pressure — and OOMKilled
              # fires before reclaim catches up.
              #
              # Tuned to 20Gi: enough for one ~35 GB Q6 model's
              # working set + cache_ram (2 GiB) + Python/runner
              # overhead, but under the 32 GB host total so the
              # node still has room for the small-runner pod and
              # other workloads.  Bump higher only if OOMKilled
              # recurs and you have headroom.
              memory: "20Gi"
              cpu: "8"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: slots
              mountPath: /slots
          env:
            - name: PYTHONPATH
              value: "/app"
            - name: PYTHONUNBUFFERED
              value: "1"
            # Used by utils/dcgm_metrics.py to filter DCGM exporter scrapes
            # to the local node's GPUs only.  The dcgm-exporter Service
            # load-balances across all GPU nodes; without this filter,
            # alternating scrapes would return foreign-node metrics.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: LLAMA_SERVER_EXECUTABLE
              value: "/llama.cpp/build/bin/llama-server"
            - name: MODELS_FILE_PATH
              value: "/app/.models.yaml"
            - name: CACHE_TIMEOUT_MIN
              value: "6"
            - name: EVICTION_TIMEOUT_MIN
              value: "12"
            - name: RUNNER_PORT
              value: "8000"
            - name: RUNNER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT_RANGE_START
              value: "8001"
            - name: SERVER_PORT_RANGE_END
              value: "8900"
            - name: CUDA_VISIBLE_DEVICES
              value: "0,1,2"
            - name: CUDA_DEVICE_ORDER
              value: "PCI_BUS_ID"
            - name: CUDA_LAUNCH_BLOCKING
              value: "0"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility,video"
            - name: PYTHONMALLOC
              value: "malloc"
            - name: MALLOC_ARENA_MAX
              value: "2"
            - name: GGML_LOG_LEVEL
              value: "2"
            - name: LOG_FORMAT
              value: "json"
            - name: RUNNER_NAME
              value: "llmmllab-runner"
            - name: TEMPO_ENDPOINT
              value: "http://tempo.llmmllab.svc.cluster.local:4317"
            - name: DCGM_METRICS_ENABLED
              value: "true"
            # Sidecar lives in the same pod network namespace — scrape
            # via localhost to avoid the cluster Service's cross-node
            # load-balancing.  Hostname filter in dcgm_metrics.py is
            # then a no-op (always matches) since the local sidecar
            # only sees this node's GPUs anyway.
            - name: DCGM_EXPORTER_URL
              value: "http://localhost:9400/metrics"
            - name: SLOT_SAVE_DIR
              value: "/slots"
        # DCGM exporter sidecar.  Image and configuration mirror the
        # gpu-operator's nvidia-dcgm-exporter DaemonSet (4.4.2-4.7.0-distroless)
        # — the older 2.3.2 image previously commented out here had a
        # missing-entrypoint bug.  Listens on localhost:9400 inside the
        # pod and is scraped by the runner's update_dcgm_metrics loop
        # via DCGM_EXPORTER_URL=http://localhost:9400/metrics.
        - name: dcgm-exporter
          image: nvcr.io/nvidia/k8s/dcgm-exporter:4.4.2-4.7.0-distroless
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 9400
              name: metrics
              protocol: TCP
          env:
            - name: DCGM_EXPORTER_LISTEN
              value: ":9400"
            - name: DCGM_EXPORTER_KUBERNETES
              value: "true"
            - name: DCGM_EXPORTER_COLLECTORS
              value: "/etc/dcgm-exporter/dcp-metrics-included.csv"
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: true
          volumeMounts:
            - name: pod-gpu-resources
              mountPath: /var/lib/kubelet/pod-resources
              readOnly: true
          resources:
            requests:
              memory: "200Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
  strategy:
    type: Recreate
---
