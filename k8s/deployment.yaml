apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmmllab-runner
  namespace: llmmllab
  labels:
    app: llmmllab-runner
spec:
  selector:
    matchLabels:
      app: llmmllab-runner
  template:
    metadata:
      labels:
        app: llmmllab-runner
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: lsnode-3
      volumes:
        - name: models
          hostPath:
            path: /models
            type: DirectoryOrCreate
        - name: slots
          hostPath:
            path: /slots
            type: DirectoryOrCreate
      containers:
        - name: llmmllab-runner
          image: 192.168.0.71:31500/llmmllab-runner:latest
          imagePullPolicy: Always
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RAWIO
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              memory: "8Gi"
              cpu: "4"
            limits:
              # History on this cap:
              #   20Gi → OOM after 16h of LLM-only traffic (mmap page
              #   cache grew under cgroup v2).
              #   24Gi → OOM as soon as in-process pipelines were
              #   added (XPart needs ~17 GB transient during weight
              #   load; concurrent Qwen-27B pushes ~5-8 GB of system
              #   RAM via KV-offload + context checkpoints — easily
              #   breaches 24Gi when both run at once).
              # 26Gi → host node (lsnode-3) has 32 GiB total, so this
              #   is the realistic ceiling without overcommitting.
              #   With this cap the runner CANNOT safely hold an
              #   active Qwen-27B session AND load XPart at the same
              #   time — callers must evict one before invoking the
              #   other.  ``IN_PROCESS_AUTO_UNLOAD=true`` handles the
              #   "image pipeline goes idle" direction; the chat
              #   side needs explicit eviction (the /generate-3d
              #   skill does this between steps).
              memory: "26Gi"
              cpu: "8"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: slots
              mountPath: /slots
          env:
            # Includes XPart + P3-SAM source dirs so the in-process
            # Hunyuan3D-Part pipeline (``pipelines/mesh2parts``) can
            # ``from partgen.partformer_pipeline import ...``.  Neither
            # XPart nor P3-SAM ships a wheel — they're directory-on-PATH.
            - name: PYTHONPATH
              value: "/app:/opt/hunyuan3d-part/XPart:/opt/hunyuan3d-part/P3-SAM"
            # Disable any HuggingFace Hub lookups at runtime.  All
            # weights the in-process pipelines need (Hunyuan3D-2.1,
            # RMBG-2.0, Hunyuan3D-Part, facebook/sonata) are
            # pre-downloaded into /models on the host PVC.  If
            # something does sneak through and try to contact HF the
            # request fails fast rather than silently hitting the
            # network and slowing the request.
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            # Mitigate VRAM fragmentation for XPart's large fp32
            # diffusion forward pass (~17 GB resident + 6 GB workspace
            # on a 24 GB 3090 — leaves no room for fragmented gaps).
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"
            - name: PYTHONUNBUFFERED
              value: "1"
            # Used by utils/dcgm_metrics.py to filter DCGM exporter scrapes
            # to the local node's GPUs only.  The dcgm-exporter Service
            # load-balances across all GPU nodes; without this filter,
            # alternating scrapes would return foreign-node metrics.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: LLAMA_SERVER_EXECUTABLE
              value: "/llama.cpp/build/bin/llama-server"
            - name: MODELS_FILE_PATH
              value: "/app/.models.yaml"
            - name: CACHE_TIMEOUT_MIN
              value: "6"
            - name: EVICTION_TIMEOUT_MIN
              value: "12"
            - name: RUNNER_PORT
              value: "8000"
            - name: RUNNER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT_RANGE_START
              value: "8001"
            - name: SERVER_PORT_RANGE_END
              value: "8900"
            - name: CUDA_VISIBLE_DEVICES
              value: "0,1,2"
            - name: CUDA_DEVICE_ORDER
              value: "PCI_BUS_ID"
            - name: CUDA_LAUNCH_BLOCKING
              value: "0"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility,video"
            - name: PYTHONMALLOC
              value: "malloc"
            - name: MALLOC_ARENA_MAX
              value: "2"
            - name: GGML_LOG_LEVEL
              value: "2"
            - name: LOG_FORMAT
              value: "json"
            - name: RUNNER_NAME
              value: "llmmllab-runner"
            - name: TEMPO_ENDPOINT
              value: "http://tempo.llmmllab.svc.cluster.local:4317"
            - name: DCGM_METRICS_ENABLED
              value: "true"
            # Use the cluster Service for the gpu-operator DaemonSet
            # exporter; utils/dcgm_metrics.py filters by NODE_NAME to
            # the local node so cross-node samples are dropped even
            # when the Service load-balances.
            - name: DCGM_EXPORTER_URL
              value: "http://nvidia-dcgm-exporter.gpu-operator.svc.cluster.local:9400/metrics"
            - name: SLOT_SAVE_DIR
              value: "/slots"
            # In-process pipelines (rembg, img23d, mesh2parts) are
            # 6-20 GB resident.  Unload them after each request so
            # other models (llama.cpp Qwen, SD diffusion) aren't
            # crowded out of VRAM between turns.  Trade-off: each
            # subsequent request pays the cold-start cost again
            # (~5-30 s depending on pipeline).  Set to ``false`` if
            # you're benchmarking back-to-back calls.
            - name: IN_PROCESS_AUTO_UNLOAD
              value: "true"
        # No DCGM exporter sidecar — Prometheus scrapes the
        # gpu-operator's nvidia-dcgm-exporter DaemonSet directly (see
        # k8s/prometheus-config.yaml) and Grafana panels query
        # DCGM_FI_DEV_* metrics natively.  The runner's local DCGM
        # scrape loop is still functional via the cluster Service for
        # internal gauges, filtered by NODE_NAME to the local node.
  strategy:
    type: Recreate
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: llmmllab-runner-small
  namespace: llmmllab
  labels:
    app: llmmllab-runner-small
    size: small
spec:
  selector:
    matchLabels:
      app: llmmllab-runner-small
      size: small
  template:
    metadata:
      labels:
        app: llmmllab-runner-small
        size: small
    spec:
      runtimeClassName: nvidia
      nodeSelector:
        kubernetes.io/hostname: lsnode-4
      volumes:
        - name: models
          hostPath:
            path: /models
            type: DirectoryOrCreate
        - name: slots
          hostPath:
            path: /slots
            type: DirectoryOrCreate
      containers:
        - name: llmmllab-runner
          image: 192.168.0.71:31500/llmmllab-runner:latest
          imagePullPolicy: Always
          securityContext:
            privileged: true
            capabilities:
              add:
                - SYS_ADMIN
                - SYS_RAWIO
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          resources:
            requests:
              memory: "4Gi"
              cpu: "2"
            limits:
              # 8Gi was too tight: the small models declare num_ctx=200000
              # with kv_on_cpu=True (see .models.small.yaml), so each
              # llama.cpp server offloads its KV cache to HOST RAM rather
              # than VRAM.  Two concurrent servers (e.g. Qwen3.5-4B +
              # Qwen3.5-9B) plus batch buffers overran the 8Gi cgroup limit
              # and the kernel OOMKilled the whole pod (exit 137) — dropping
              # every in-memory server handle at once, which is what made
              # the API's sticky handles 404 ("stale handle") and the next
              # /server/create 500.  lsnode-4 has ~11.1Gi allocatable, so
              # 10Gi leaves headroom for kubelet/OS while giving the CPU KV
              # caches room to coexist.  Note _evict_for_vram only accounts
              # for VRAM, not host RAM, so the limit is the only backstop.
              memory: "10Gi"
              cpu: "4"
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: slots
              mountPath: /slots
          env:
            # Includes XPart + P3-SAM source dirs so the in-process
            # Hunyuan3D-Part pipeline (``pipelines/mesh2parts``) can
            # ``from partgen.partformer_pipeline import ...``.  Neither
            # XPart nor P3-SAM ships a wheel — they're directory-on-PATH.
            - name: PYTHONPATH
              value: "/app:/opt/hunyuan3d-part/XPart:/opt/hunyuan3d-part/P3-SAM"
            # Disable any HuggingFace Hub lookups at runtime.  All
            # weights the in-process pipelines need (Hunyuan3D-2.1,
            # RMBG-2.0, Hunyuan3D-Part, facebook/sonata) are
            # pre-downloaded into /models on the host PVC.  If
            # something does sneak through and try to contact HF the
            # request fails fast rather than silently hitting the
            # network and slowing the request.
            - name: HF_HUB_OFFLINE
              value: "1"
            - name: TRANSFORMERS_OFFLINE
              value: "1"
            # Mitigate VRAM fragmentation for XPart's large fp32
            # diffusion forward pass (~17 GB resident + 6 GB workspace
            # on a 24 GB 3090 — leaves no room for fragmented gaps).
            - name: PYTORCH_CUDA_ALLOC_CONF
              value: "expandable_segments:True"
            - name: PYTHONUNBUFFERED
              value: "1"
            # Used by utils/dcgm_metrics.py to filter DCGM exporter scrapes
            # to the local node's GPUs only.  The dcgm-exporter Service
            # load-balances across all GPU nodes; without this filter,
            # alternating scrapes would return foreign-node metrics.
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
            - name: LOG_LEVEL
              value: "DEBUG"
            - name: LLAMA_SERVER_EXECUTABLE
              value: "/llama.cpp/build/bin/llama-server"
            - name: MODELS_FILE_PATH
              value: "/app/.models.small.yaml"
            - name: CACHE_TIMEOUT_MIN
              value: "10"
            - name: EVICTION_TIMEOUT_MIN
              value: "30"
            - name: RUNNER_PORT
              value: "8000"
            - name: RUNNER_HOST
              value: "0.0.0.0"
            - name: SERVER_PORT_RANGE_START
              value: "8001"
            - name: SERVER_PORT_RANGE_END
              value: "8900"
            - name: CUDA_VISIBLE_DEVICES
              value: "0"
            - name: CUDA_DEVICE_ORDER
              value: "PCI_BUS_ID"
            - name: CUDA_LAUNCH_BLOCKING
              value: "0"
            - name: NVIDIA_VISIBLE_DEVICES
              value: "all"
            - name: NVIDIA_DRIVER_CAPABILITIES
              value: "compute,utility,video"
            - name: PYTHONMALLOC
              value: "malloc"
            - name: MALLOC_ARENA_MAX
              value: "2"
            - name: GGML_LOG_LEVEL
              value: "2"
            - name: LOG_FORMAT
              value: "json"
            - name: RUNNER_NAME
              value: "llmmllab-runner-small"
            - name: TEMPO_ENDPOINT
              value: "http://tempo.llmmllab.svc.cluster.local:4317"
            - name: GPU_POWER_CAP_PCT
              value: "90"
            - name: DCGM_METRICS_ENABLED
              value: "true"
            # Use the cluster Service for the gpu-operator DaemonSet
            # exporter; utils/dcgm_metrics.py filters by NODE_NAME to
            # the local node so cross-node samples are dropped even
            # when the Service load-balances.
            - name: DCGM_EXPORTER_URL
              value: "http://nvidia-dcgm-exporter.gpu-operator.svc.cluster.local:9400/metrics"
            - name: SLOT_SAVE_DIR
              value: "/slots"
            # In-process pipelines (rembg, img23d, mesh2parts) are
            # 6-20 GB resident.  Unload them after each request so
            # other models (llama.cpp Qwen, SD diffusion) aren't
            # crowded out of VRAM between turns.  Trade-off: each
            # subsequent request pays the cold-start cost again
            # (~5-30 s depending on pipeline).  Set to ``false`` if
            # you're benchmarking back-to-back calls.
            - name: IN_PROCESS_AUTO_UNLOAD
              value: "true"
        # No DCGM exporter sidecar — Prometheus scrapes the
        # gpu-operator's nvidia-dcgm-exporter DaemonSet directly (see
        # k8s/prometheus-config.yaml) and Grafana panels query
        # DCGM_FI_DEV_* metrics natively.  The runner's local DCGM
        # scrape loop is still functional via the cluster Service for
        # internal gauges, filtered by NODE_NAME to the local node.

  strategy:
    type: Recreate
