# OLD Q6 quant — renamed to _Q6 because the UD-Q6_K_XL build cascades
# (word-association runaway); the canonical Qwen3_6_27B is now the Q5 quant
# (see the block below + docs/qwen36-word-cascade.md). Kept for comparison.
- id: Qwen3_6_27B_Q6
  name: "Qwen3.6-27B-Q6"
  model: "Qwen3.6-27B-Q6"
  task: TextToText
  modified_at: "2026-04-22T15:59:03.844554+00:00"
  digest: 19a2f4733a863088bc06665bf307dca95f7d4370b4d8690340cdff9992fe48c6
  size: 35325163744
  details:
    format: gguf
    gguf_file: "/models/qwen3.6/27b/ud-q6_k_xl.gguf"
    family: qwen
    families:
      - qwen
    parameter_size: 26.9B
    quantization_level: Q6_K_XL
    precision: int4
    dtype: int4
    specialization: Text
    size: 35325163744
    original_ctx: 2048
    # mmproj REMOVED for the text workload. Loading the vision projector forced
    # llama-server into multimodal mode, which: (1) force-disables slot KV
    # save/restore (see 78df477), cache_reuse, AND ctx_shift, and (2) routes ALL
    # text generation through the less-tested multimodal update_slots path
    # (the "Qwen-VL requires >=1024 image tokens" warning confirms text ran the
    # vision path). This model is specialization: Text — it doesn't need vision.
    # Dropping the projector frees ~1.7 GiB VRAM and restores the standard,
    # well-tested text generation + KV path. Re-add a dedicated VL model if
    # image input is ever needed.
    # clip_model_path: /models/qwen3.6/27b/mmproj.gguf
  parameters:
    num_ctx: 200000
    repeat_last_n: 128
    # 1.0 = neutral; >1.0 penalises repetition (1.05–1.15 is typical).
    # Anything <1.0 REWARDS repetition (see llama-sampler.cpp:2690–2694),
    # which manifests as runaway think loops and repeated tool-call fences
    # on Qwen3.  Keep this >= 1.0.
    repeat_penalty: 1.15
    # temperature 0.65 -> 0.60: word-association cascades are a low-temperature-
    # tail phenomenon; 0.60 (bottom of Qwen3's recommended thinking range
    # 0.6-0.7) reduces drift without flattening reasoning.
    temperature: 0.60
    seed: -1
    num_predict: 16384
    # top_k 20 -> 12: narrows the candidate pool so the model can't reach for
    # the long list of "semantically adjacent" words that feed the cascade.
    top_k: 12
    top_p: 0.95
    # min_p: probability floor — tokens below min_p * max_prob are excluded.
    # 0.00 let ANY token through (no floor), which allowed the model to drift
    # into word-association cascades.  Bumped 0.03 -> 0.06: the cascade words
    # are lower-probability than the correct continuation, so a higher floor
    # cuts them while preserving genuine creative output.
    min_p: 0.06
    # DRY (Don't Repeat Yourself) sampler — catches N-gram SEQUENCE
    # repetition that repeat_penalty misses (each word different but
    # pattern repeating).  Bumped harder: multiplier 0.8 -> 1.2 and lookback
    # 512 -> 2048 so a building cascade is penalised across a longer window.
    # NOTE: pure unigram cascades (each word unique) are NOT catchable by DRY
    # or repeat_penalty — min_p/top_k/temperature are the real levers there.
    dry_multiplier: 1.2
    dry_base: 1.75
    dry_allowed_length: 2
    dry_penalty_last_n: 2048
    # batch=4096, ubatch=2048 widens the prompt-processing kernel from
    # the llama.cpp server defaults (2048/512). Single larger kernels
    # absorb better into Ampere SMs; the HF MoE-offload guide flags
    # equal batch/ubatch as the standard tuning step. Capped at 2048
    # for the physical (ubatch) batch because GPU2 already sits near
    # 24/24 GiB and a 4096 ubatch would push the compute buffer over.
    batch_size: 4096
    micro_batch_size: 2048
    # cache_ram bumped from 2048 to 4096 (llama.cpp default is 8192).
    # More host-side prompt cache helps slot save/restore, but the
    # runner pod only has ~11 GiB host RAM free — 4 GiB is the safe
    # middle ground.
    cache_ram: 4096
    n_gpu_layers: -1
    think: True
    # reasoning_budget dropped 8192 -> 4096. At observed 13 tok/s
    # decode, 8192 reasoning tokens is ~10 minutes of pure thinking
    # before the user sees a first non-think token. 4096 is plenty
    # for coding/structured tasks; reasoning_budget_message lets the
    # model wrap up cleanly at the cap.
    reasoning_budget: 4096
    kv_on_cpu: False
    tensor_split: "0,1,1"
    main_gpu: 2
    # n_cpu_moe: 10
    # ctx_size_reduction_limit: 1.0
    # slot_prompt_similarity: 0
    # Unified KV cache: a single shared KV pool, so EVERY slot can use the
    # full num_ctx (200k) — slots do NOT fragment the context the way
    # non-unified parallel does (parallel=N would otherwise give each slot
    # num_ctx/N). With kv_unified + 4 slots the runner serves up to 4
    # concurrent large-context sessions (agent + CC dispatches + crons) at the
    # full context each, instead of LRU-evicting + full-re-prefilling them
    # against 2 slots — which was the dominant cause of the multi-session
    # slowdown. (Was parallel:2, non-unified.)
    kv_unified: True
    parallel: 4
    # Eight in-memory KV snapshots per slot is the llama.cpp default and
    # matches the per-turn restore frequency we want.  At 32 the runner
    # was copying ~150 MiB per turn even on 97-99 % cache hits.
    ctx_checkpoints: 8
    # Mirostat off — adds per-token latency vs the top_p/top_k/min_p
    # sampler stack already configured above.  Drops eval rate ~10 %
    # on Qwen3 in our testing.
    mirostat: 0
    split_mode: "layer"
  pipeline: llama
  lora_weights: []
  provider: llama_cpp

