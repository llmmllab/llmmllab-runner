    main_gpu: 2
    # n_cpu_moe: 10
    # ctx_size_reduction_limit: 1.0
    # slot_prompt_similarity: 0
    # Two slots is enough for a single-user agent workload and gives each
    # slot ~2x the KV headroom of parallel=4.  With kv_unified each slot
    # competes for the same KV pool, so fewer slots = less LRU thrashing
    # under multi-session load.
    parallel: 2
