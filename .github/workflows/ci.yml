name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Pull the vendored submodules (vendors/llama.cpp,
          # vendors/stable-diffusion.cpp, vendors/Hunyuan3D-2) so the
          # ruff exclude path and pytest testpaths resolve consistently
          # with what developers see locally.  Tests don't import from
          # vendors/ directly, but ruff would walk into an
          # uninitialised submodule directory and silently miss the
          # exclude.
          submodules: recursive

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Ruff linter
        run: uv run ruff check . || echo "⚠️  Ruff lint warnings — fix before merge"

      - name: Ruff formatter check
        run: uv run ruff format --check . || echo "⚠️  Ruff format warnings — fix before merge"

  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # Pull the vendored submodules (vendors/llama.cpp,
          # vendors/stable-diffusion.cpp, vendors/Hunyuan3D-2) so the
          # ruff exclude path and pytest testpaths resolve consistently
          # with what developers see locally.  Tests don't import from
          # vendors/ directly, but ruff would walk into an
          # uninitialised submodule directory and silently miss the
          # exclude.
          submodules: recursive

      - uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --frozen

      - name: Run tests
        run: uv run pytest -v --tb=short
