name: Deploy Runner

on:
  push:
    branches: [main]
    # Tooling/docs/CI-only changes don't change the runtime image — don't roll
    # the runner (and interrupt live sessions) for them. A push that ALSO touches
    # anything outside this list still deploys.
    paths-ignore:
      - '**.md'
      - 'Makefile'
      - 'scripts/git-hooks/**'
      - '.github/**'

jobs:
  deploy:
    name: Build & Deploy Runner
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          # vendors/llama.cpp, vendors/stable-diffusion.cpp, and
          # vendors/Hunyuan3D-2 are git submodules.  The Dockerfile
          # COPYs each into the build context — without recursive
          # checkout those directories are empty and the COPY layers
          # fail with "no source files were specified".
          submodules: recursive

      # Force vendors/llama.cpp to the PINNED commit (LLAMA_CPP_SHA in the
      # Makefile) — NOT the committed submodule gitlink. The gitlink keeps getting
      # reverted to an old SHA by `git commit -a` from a stale local checkout,
      # which blocked every deploy on the gemma4uv guard. Pinning here makes that
      # drift IRRELEVANT: the build always uses the intended llama.cpp regardless
      # of what the gitlink says. The Makefile pin is the single source of truth —
      # to roll llama.cpp forward, bump LLAMA_CPP_SHA there. (The Build step derives
      # LLAMA_SHA from `rev-parse HEAD`, which is now the pin, so the cache busts
      # correctly.)
      - name: Pin vendors/llama.cpp to LLAMA_CPP_SHA
        run: |
          set -euo pipefail
          git submodule sync --recursive
          # init/clone the submodule dir (to whatever the gitlink says — we override next)
          git submodule update --init --force --recursive || true
          PIN=$(grep -E '^LLAMA_CPP_SHA' Makefile | head -1 | sed -E 's/^[^=]*=[[:space:]]*//' | awk '{print $1}')
          if [ -z "$PIN" ]; then echo "::error::LLAMA_CPP_SHA not found in Makefile"; exit 1; fi
          echo "Committed gitlink: $(git -C vendors/llama.cpp rev-parse HEAD)  |  Makefile pin: ${PIN}"
          git -C vendors/llama.cpp fetch -q origin "$PIN" 2>/dev/null || git -C vendors/llama.cpp fetch -q --all
          git -C vendors/llama.cpp checkout -q --detach "$PIN"
          echo "vendors/llama.cpp pinned to $(git -C vendors/llama.cpp rev-parse HEAD)"
          # Sanity-check the PIN (not the gitlink): it must have gemma-4 vision.
          # This can now only fail if LLAMA_CPP_SHA itself is wrong.
          if ! grep -rl "gemma4uv" vendors/llama.cpp/tools/mtmd >/dev/null 2>&1; then
            echo "::error::LLAMA_CPP_SHA=${PIN} LACKS gemma4uv support — fix the pin in the Makefile."
            exit 1
          fi

      - name: Build & Deploy
        run: |
          set -euo pipefail
          REGISTRY=192.168.0.71:31500
          IMAGE=llmmllab-runner
          SHA=${{ github.sha }}
          SHORT_SHA=$(echo $SHA | cut -c1-7)

          echo "Building llmmllab-runner (SHA: $SHORT_SHA)..."

          # Build Docker image. LLAMA_SHA busts the llama.cpp COPY+compile cache
          # when (and only when) the submodule is bumped, so a new llama.cpp
          # actually recompiles instead of serving a stale cached layer.
          LLAMA_SHA=$(git -C vendors/llama.cpp rev-parse HEAD)
          echo "llama.cpp submodule SHA: ${LLAMA_SHA}"
          docker build --build-arg LLAMA_SHA=${LLAMA_SHA} -t ${REGISTRY}/${IMAGE}:${SHA} .

          # Push image
          docker push ${REGISTRY}/${IMAGE}:${SHA}
          docker tag ${REGISTRY}/${IMAGE}:${SHA} ${REGISTRY}/${IMAGE}:latest
          docker push ${REGISTRY}/${IMAGE}:latest

          # Deploy to Kubernetes
          echo "Deploying to Kubernetes..."
          chmod +x k8s/apply.sh
          ./k8s/apply.sh --no-build

          echo "Deployed llmmllab-runner:${SHA}"
