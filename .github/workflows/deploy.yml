name: Deploy Runner

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy Runner
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Build & Deploy
        run: |
          set -euo pipefail
          SHA=${{ github.sha }}
          SHORT_SHA=$(echo $SHA | cut -c1-7)
          echo "Building llmmllab-runner (SHA: $SHORT_SHA)..."

          # Build and push using the Makefile deploy target
          TAG=$SHA make deploy
