name: Deploy Runner

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: Build & Deploy Runner
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          # vendors/llama.cpp and vendors/stable-diffusion.cpp are git
          # submodules.  The Dockerfile does ``COPY vendors/llama.cpp
          # /llama.cpp`` and ``COPY vendors/stable-diffusion.cpp
          # /stable-diffusion.cpp`` — without recursive checkout those
          # directories are empty and the COPY layers fail with "no source
          # files were specified".
          submodules: recursive

      - name: Build & Deploy
        run: |
          set -euo pipefail
          REGISTRY=192.168.0.71:31500
          IMAGE=llmmllab-runner
          SHA=${{ github.sha }}
          SHORT_SHA=$(echo $SHA | cut -c1-7)

          echo "Building llmmllab-runner (SHA: $SHORT_SHA)..."

          # Build Docker image
          docker build -t ${REGISTRY}/${IMAGE}:${SHA} .

          # Push image
          docker push ${REGISTRY}/${IMAGE}:${SHA}
          docker tag ${REGISTRY}/${IMAGE}:${SHA} ${REGISTRY}/${IMAGE}:latest
          docker push ${REGISTRY}/${IMAGE}:latest

          # Deploy to Kubernetes
          echo "Deploying to Kubernetes..."
          chmod +x k8s/apply.sh
          ./k8s/apply.sh --no-build

          echo "Deployed llmmllab-runner:${SHA}"
