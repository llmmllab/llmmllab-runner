name: Deploy Runner

on:
  push:
    branches: [main]
    # Tooling/docs/CI-only changes don't change the runtime image — don't roll
    # the runner (and interrupt live sessions) for them. A push that ALSO touches
    # anything outside this list still deploys.
    paths-ignore:
      - '**.md'
      - 'Makefile'
      - 'scripts/git-hooks/**'
      - '.github/**'

jobs:
  deploy:
    name: Build & Deploy Runner
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
        with:
          # vendors/llama.cpp, vendors/stable-diffusion.cpp, and
          # vendors/Hunyuan3D-2 are git submodules.  The Dockerfile
          # COPYs each into the build context — without recursive
          # checkout those directories are empty and the COPY layers
          # fail with "no source files were specified".
          submodules: recursive

      # actions/checkout's submodule step does NOT force an already-checked-out
      # submodule to the newly-committed SHA on a self-hosted runner with a
      # persistent workspace — so a bumped vendors/llama.cpp can stay at the old
      # commit, the Dockerfile's `COPY vendors/llama.cpp` cache-hits, and the old
      # binary gets baked in (this silently shipped a llama.cpp without gemma4
      # vision support, 2026-06). Force the submodules to the committed gitlink.
      - name: Force submodules to the committed SHA
        run: |
          set -euo pipefail
          git submodule sync --recursive
          git submodule update --init --force --recursive
          echo "vendors/llama.cpp -> $(git -C vendors/llama.cpp rev-parse HEAD)"
          if grep -rl "gemma4uv" vendors/llama.cpp/tools/mtmd >/dev/null 2>&1; then
            echo "llama.cpp HAS gemma4uv support"
          else
            echo "::error::vendors/llama.cpp is checked out at $(git -C vendors/llama.cpp rev-parse HEAD) which LACKS gemma4uv support."
            echo "This usually means a 'git commit -a' in a stale checkout reverted the submodule gitlink."
            echo "Fix locally:  make vendor-sync && git commit   (forces llama.cpp to the pinned LLAMA_CPP_SHA and stages it)"
            echo "Prevent it:   make install-hooks               (a pre-commit guard so a drifted gitlink can't be committed)"
            exit 1
          fi

      - name: Build & Deploy
        run: |
          set -euo pipefail
          REGISTRY=192.168.0.71:31500
          IMAGE=llmmllab-runner
          SHA=${{ github.sha }}
          SHORT_SHA=$(echo $SHA | cut -c1-7)

          echo "Building llmmllab-runner (SHA: $SHORT_SHA)..."

          # Build Docker image. LLAMA_SHA busts the llama.cpp COPY+compile cache
          # when (and only when) the submodule is bumped, so a new llama.cpp
          # actually recompiles instead of serving a stale cached layer.
          LLAMA_SHA=$(git -C vendors/llama.cpp rev-parse HEAD)
          echo "llama.cpp submodule SHA: ${LLAMA_SHA}"
          docker build --build-arg LLAMA_SHA=${LLAMA_SHA} -t ${REGISTRY}/${IMAGE}:${SHA} .

          # Push image
          docker push ${REGISTRY}/${IMAGE}:${SHA}
          docker tag ${REGISTRY}/${IMAGE}:${SHA} ${REGISTRY}/${IMAGE}:latest
          docker push ${REGISTRY}/${IMAGE}:latest

          # Deploy to Kubernetes
          echo "Deploying to Kubernetes..."
          chmod +x k8s/apply.sh
          ./k8s/apply.sh --no-build

          echo "Deployed llmmllab-runner:${SHA}"
